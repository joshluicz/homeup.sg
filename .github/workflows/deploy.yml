name: Build & Deploy LP (Static FTP)

on:
  push:
    branches:
      - master
    paths:
      - "app/(public)/**"
      - "app/layout.tsx"
      - "app/globals.css"
      - "app/robots.ts"
      - "app/sitemap.ts"
      - "components/**"
      - "lib/data/**"
      - "public/**"
      - "tailwind.config.ts"
      - "postcss.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Remove server-only routes before static export
        run: |
          # Admin CMS, API routes, and middleware require a live Node.js server (Supabase, cookies).
          # They are incompatible with output:export and are deployed separately on the CMS branch.
          rm -rf app/api app/'(admin)'
          rm -f middleware.ts

      - name: Build static export
        run: npm run build
        env:
          STATIC_EXPORT: "true"

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          local-dir: ./out/
          server-dir: /
