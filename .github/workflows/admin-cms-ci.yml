name: Admin CMS CI

on:
  push:
    branches:
      - master
      - "feature/**"
      - "feat/**"
      - "chore/**"
    paths:
      - "app/(admin)/**"
      - "app/api/**"
      - "components/admin/**"
      - "lib/listings/**"
      - "lib/supabase/**"
      - "middleware.ts"
      - "supabase/**"
      - "next.config.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/admin-cms-ci.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check admin catalog import boundaries
        run: npm run check:admin-catalog-imports

      - name: Check generate route import boundaries
        run: npm run check:generate-route-imports

      - name: Check pipeline finalize smoke test
        run: npm run check:pipeline-finalize

      - name: Build Next.js (server mode)
        run: CI=true npm run build
